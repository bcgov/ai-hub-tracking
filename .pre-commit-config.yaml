minimum_pre_commit_version: "3.6.0"

repos:
  - repo: local
    hooks:
      - id: terraform-lint
        name: Terraform fmt and tflint
        entry: python .github/scripts/terraform_lint.py
        language: system
        files: ^(initial-setup/infra|infra-ai-hub)/.*\.tf$

      - id: portal-frontend-lint
        name: Portal Frontend ESLint + Prettier check
        entry: bash -c 'cd tenant-onboarding-portal/frontend && npm run lint && npm run format:check'
        language: system
        files: ^tenant-onboarding-portal/frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: portal-backend-lint
        name: Portal Backend ESLint + Prettier check
        entry: bash -c 'cd tenant-onboarding-portal/backend && npm run lint && npm run format:check'
        language: system
        files: ^tenant-onboarding-portal/backend/.*\.ts$
        pass_filenames: false

      - id: key-rotation-lint
        name: Key Rotation — ruff lint + format check
        entry: bash -c 'cd jobs/apim-key-rotation && uv run ruff check . && uv run ruff format --check .'
        language: system
        files: ^jobs/apim-key-rotation/.*\.py$
        pass_filenames: false

      - id: key-rotation-tests
        name: Key Rotation — pytest
        entry: bash -c 'cd jobs/apim-key-rotation && uv run pytest'
        language: system
        files: ^jobs/apim-key-rotation/.*\.py$
        pass_filenames: false

      - id: key-rotation-docs
        name: Key Rotation — docs build check
        entry: bash docs/build.sh
        language: system
        files: ^(jobs/apim-key-rotation/.*\.py|docs/_pages/apim-key-rotation\.html)$
        pass_filenames: false

      - id: pii-redaction-lint
        name: PII Redaction Service — ruff lint + format check
        entry: bash -c 'cd pii-redaction-service && uv run ruff check . && uv run ruff format --check .'
        language: system
        files: ^pii-redaction-service/.*\.py$
        pass_filenames: false

      - id: pii-redaction-tests
        name: PII Redaction Service — pytest
        entry: bash -c 'cd pii-redaction-service && uv run pytest'
        language: system
        files: ^pii-redaction-service/.*\.py$
        pass_filenames: false

      - id: pii-redaction-docs
        name: PII Redaction Service — docs build check
        entry: bash docs/build.sh
        language: system
        files: ^(pii-redaction-service/.*\.py|docs/_pages/language-service-pii\.html)$
        pass_filenames: false
