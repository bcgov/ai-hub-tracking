name: Run Tenant User Management Stack
description: >
  Runs deploy-scaled.sh --phase=3 (tenant-user-mgmt) with the graph SP logged
  in via OIDC using an isolated AZURE_CONFIG_DIR, and ARM_CLIENT_ID cleared.
  Clearing ARM_CLIENT_ID forces Terraform providers to fall back to their
  block-configured client_id values instead of inheriting the main SP set by
  the azure/login step (azuread → graph_client_id for Group.ReadWrite.All,
  azurerm → client_id for RBAC operations).
  The graph SP OIDC login uses a temporary config dir (GRAPH_AZURE_CONFIG_DIR)
  so it does not overwrite the runner's main SP CLI state.

inputs:
  command:
    description: "Terraform command (plan, apply, validate, destroy)"
    required: true
  environment_name:
    description: "Target environment (dev, test, prod)"
    required: true
  terraform_log_level:
    description: "Terraform log level (ERROR, WARN, INFO, DEBUG, TRACE)"
    required: false
    default: "ERROR"
  azure_tenant_id:
    description: "Azure tenant ID (pass secrets.AZURE_TENANT_ID)"
    required: true
  azure_subscription_id:
    description: "Azure subscription ID (pass secrets.AZURE_SUBSCRIPTION_ID)"
    required: true
  azure_client_id:
    description: "Main SP client ID (pass secrets.AZURE_CLIENT_ID)"
    required: true
  graph_client_id:
    description: "Graph SP client ID with Group.ReadWrite.All (pass secrets.GRAPH_CLIENT_ID)"
    required: true
  backend_resource_group:
    description: "Terraform backend storage resource group (pass secrets.VNET_RESOURCE_GROUP_NAME)"
    required: true
  storage_account_name:
    description: "Terraform backend storage account name (pass vars.STORAGE_ACCOUNT_NAME)"
    required: true

runs:
  using: composite
  steps:
    - name: Login with Graph Service Principal (OIDC)
      shell: bash
      env:
        AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
        GRAPH_CLIENT_ID: ${{ inputs.graph_client_id }}  # SP with Group.ReadWrite.All, NOT the main SP
        # Defensive: ensure az login bypasses the tunnel proxy if one is set at workflow level
        NO_PROXY: "login.microsoftonline.com"
      run: |
        set -euo pipefail
        # Exchange the GitHub Actions OIDC JWT for an Azure-compatible federated token.
        # ACTIONS_ID_TOKEN_REQUEST_TOKEN + URL are injected by GitHub when
        # `id-token: write` permission is granted on the job.
        oidc_token=$(curl -sS \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')
        # Fail fast if the token came back empty — avoids a cryptic az login error later.
        if [[ -z "${oidc_token}" || "${oidc_token}" == "null" ]]; then
          echo "::error::Failed to acquire OIDC token for graph SP login" >&2
          exit 1
        fi
        # Create a throwaway directory for this SP's CLI session.
        # Azure CLI stores tokens in AZURE_CONFIG_DIR; using a separate dir means
        # this login never touches the main SP's session already set by azure/login.
        graph_config_dir=$(mktemp -d)
        # Publish the dir path to subsequent steps via GITHUB_ENV so the next step
        # can point AZURE_CONFIG_DIR here for Terraform's azuread CLI auth.
        echo "GRAPH_AZURE_CONFIG_DIR=${graph_config_dir}" >> "$GITHUB_ENV"
        # Log in the graph SP using the federated token (no client secret needed).
        # --allow-no-subscriptions: this SP has no subscription-level RBAC,
        # only Azure AD Graph permissions — without this flag az login would error.
        # AZURE_CONFIG_DIR is scoped to this command only (prefix, not export),
        # so the runner's main SP session is left intact.
        AZURE_CONFIG_DIR="${graph_config_dir}" az login \
          --service-principal \
          --tenant "${AZURE_TENANT_ID}" \
          --username "${GRAPH_CLIENT_ID}" \
          --federated-token "${oidc_token}" \
          --allow-no-subscriptions \
          --output none
        echo "Graph SP login successful (${GRAPH_CLIENT_ID})"

    - name: Execute tenant-user-mgmt via deploy-scaled.sh
      shell: bash
      working-directory: ./infra-ai-hub
      env:
        ARM_USE_OIDC: "true"
        # Clearing ARM_CLIENT_ID is the core of the fix: Terraform providers give
        # ARM_* env vars higher precedence than explicit client_id in provider blocks.
        # With this unset, azuread falls back to graph_client_id (Group.ReadWrite.All)
        # and azurerm falls back to main SP client_id (subscription RBAC). The backend
        # still uses explicit -backend-config client_id from tf_init_stack, so it is unaffected.
        ARM_CLIENT_ID: ""
        ARM_TENANT_ID: ${{ inputs.azure_tenant_id }}
        ARM_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
        SCALED_CALLER: "deploy-terraform"
        CI: "true"
        TF_VAR_app_env: ${{ inputs.environment_name }}
        TF_VAR_subscription_id: ${{ inputs.azure_subscription_id }}
        TF_VAR_tenant_id: ${{ inputs.azure_tenant_id }}
        TF_VAR_client_id: ${{ inputs.azure_client_id }}
        TF_VAR_graph_client_id: ${{ inputs.graph_client_id }}
        GRAPH_CLIENT_ID: ${{ inputs.graph_client_id }}
        BACKEND_RESOURCE_GROUP: ${{ inputs.backend_resource_group }}
        BACKEND_STORAGE_ACCOUNT: ${{ inputs.storage_account_name }}
        TF_LOG: ${{ inputs.terraform_log_level }}
        TF_CLI_ARGS: "-no-color"
        HTTP_PROXY: "http://127.0.0.1:8118"
        HTTPS_PROXY: "http://127.0.0.1:8118"
        NO_PROXY: "management.azure.com,login.microsoftonline.com,graph.microsoft.com,registry.terraform.io,releases.hashicorp.com,github.com,objects.githubusercontent.com"
      run: |
        set -euo pipefail
        export no_proxy="$NO_PROXY"
        # Point Terraform's azuread provider CLI auth at the graph SP login dir
        # set by the previous step. GITHUB_ENV additions become shell env vars
        # in subsequent steps, so we reference GRAPH_AZURE_CONFIG_DIR directly.
        export AZURE_CONFIG_DIR="${GRAPH_AZURE_CONFIG_DIR:-}"
        chmod +x ./scripts/*.sh
        ./scripts/deploy-scaled.sh "${{ inputs.command }}" "${{ inputs.environment_name }}" --phase=3

    - name: Cleanup graph SP CLI session
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${GRAPH_AZURE_CONFIG_DIR:-}" && -d "${GRAPH_AZURE_CONFIG_DIR}" ]]; then
          rm -rf "${GRAPH_AZURE_CONFIG_DIR}"
          echo "Cleaned up graph SP config dir"
        fi
