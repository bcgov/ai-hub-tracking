name: Deploy or Remove Bastion Host

# Manual lifecycle control for the tools Bastion + jumpbox stack, provisioned via the
# bcgov/action-deployer-vm-bastion-alz action (see .deployer.yml). Use `destroy` to tear
# the stack down and `apply` to bring it back.
on:
  workflow_dispatch:
    inputs:
      command:
        description: "Terraform command for the Bastion stack"
        required: true
        type: choice
        options:
          - apply
          - plan
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  bastion:
    name: "Bastion ${{ inputs.command }} (tools)"
    uses: ./.github/workflows/.deployer.yml
    with:
      command: ${{ inputs.command }}
    secrets: inherit
