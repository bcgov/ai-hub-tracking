name: Build Containers

on:
  workflow_call:
    inputs:
      tags:
        description: "Tags to apply to the built containers multiline, separated by newlines"
        required: true
        type: string
permissions:
  id-token: write # This is required for requesting the JWT
  contents: write # This is required for actions/checkout
  packages: write
  pull-requests: write
jobs:
  builds:
    name: Builds
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package:
          - azure-proxy/privoxy
          - jobs/apim-key-rotation
          - pii-redaction-service
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@2b24ac7f95e6a019064151498660437cca3202c5
        with:
          package: ${{ matrix.package }}
          tags: ${{ inputs.tags }}
          triggers: ('${{ matrix.package }}/' '.github/workflows/.builds.yml')
          tag_fallback: latest
