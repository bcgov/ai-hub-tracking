name: .Terraform Deployer

on:
  workflow_call:
    inputs:
      environment_name:
        description: "The name of the environment to deploy to"
        required: true
        default: "tools"
        type: string
      command:
        description: "The Terraform command to run (init, plan, apply, destroy)"
        required: true
        default: "apply"
        type: string
      tag:
        description: "The container tag to use for deployment"
        required: false
        type: string
      terraform_log_level:
        description: "The Terraform logging level"
        required: false
        default: "ERROR"
        type: string
    outputs:
      plan_comment:
        description: "(deprecated) Always empty — plan comment is now passed via artifact 'plan-comment'"
        value: ""
      plan_has_changes:
        description: "Whether Terraform plan contains infrastructure changes"
        value: ${{ jobs.terraform.outputs.plan_has_changes }}
env:
  # TF_VERSION is injected at runtime by the "Load constants" step, which sources
  # .github/lib/constants.sh into $GITHUB_ENV. Do NOT redeclare it as a static env: key —
  # a static env: value would shadow $GITHUB_ENV and leave terraform_version empty.
  TF_LOG: ${{ inputs.terraform_log_level }}
permissions:
  id-token: write # Required for OIDC authentication
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    steps:
      - name: Check Environment Name
        run: |
          VALID_ENVS=("dev" "test" "prod")
          if [[ ! " ${VALID_ENVS[@]} " =~ " ${{ inputs.environment_name }} " ]]; then
            echo "Error: Invalid environment name '${{ inputs.environment_name }}'. Valid options are: ${VALID_ENVS[*]}"
            exit 1
          fi

  terraform:
    environment: ${{ inputs.environment_name }}
    name: Terraform ${{ inputs.command }} via Secure Tunnel
    concurrency:
      # Fixed group across ALL environments: serialises every job that touches the shared
      # tools Bastion so the resource lock create/delete can never race between GitHub jobs.
      # (Still prevents same-env Terraform state races — the group is a superset of per-env.)
      cancel-in-progress: false
      group: bastion-tunnel
    needs: validate
    runs-on: ubuntu-24.04
    outputs:
      plan_has_changes: ${{ steps.plan_summary.outputs.has_changes }}
    env:
      # Bastion + jumpbox live in the tools subscription; all bastion `az` calls target it explicitly.
      TOOLS_SUBSCRIPTION_ID: ${{ secrets.TOOLS_SUBSCRIPTION_ID }}
      # BASTION_RESOURCE_GROUP and SOCKS_PORT are sourced from .github/lib/constants.sh
      # by ensure-bastion.sh and bastion-purge.sh directly — no workflow-level override needed.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Load constants
        shell: bash
        run: |
          source .github/lib/constants.sh
          echo "TF_VERSION=$TF_VERSION" >> "$GITHUB_ENV"
      - name: Azure CLI Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      # Provision (if needed) and lock the Bastion. Lock released by bastion-purge.sh
      # in the always() step below.
      - name: Ensure Bastion (provision → lock)
        shell: bash
        run: |
          bash .github/scripts/ensure-bastion.sh \
            --notes "Held by GitHub Actions during deploy"

      # Re-authenticate before opening the tunnel: provisioning above can exceed the
      # ~5 min GitHub OIDC client-assertion lifetime, which would otherwise expire before
      # the AAD-authenticated `az network bastion ssh` runs (AADSTS700024).
      - name: Azure CLI Login (OIDC) — refresh before tunnel
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Open Bastion tunnel
        shell: bash
        run: |
          bash .github/scripts/open-bastion-tunnel.sh \
            --privoxy-image "ghcr.io/${{ github.repository }}/azure-proxy/privoxy:${{ inputs.tag || 'latest' }}"

      - name: Validate required network secret
        shell: bash
        env:
          SUBNET_ALLOCATION: ${{ secrets.SUBNET_ALLOCATION }}
          EXTERNAL_PEERED_PROJECTS: ${{ secrets.EXTERNAL_PEERED_PROJECTS }}
        run: |
          set -euo pipefail

          if [[ -z "${SUBNET_ALLOCATION}" ]]; then
            echo "Error: Required environment secret SUBNET_ALLOCATION is missing or empty." >&2
            echo "Add SUBNET_ALLOCATION in GitHub Environment secrets as a JSON object." >&2
            exit 1
          fi

          python3 -c 'import json, os; value = os.environ.get("SUBNET_ALLOCATION", ""); parsed = json.loads(value); assert isinstance(parsed, dict) and bool(parsed)'

          if [[ -n "${EXTERNAL_PEERED_PROJECTS}" ]]; then
            python3 -c 'import json, os; value = os.environ.get("EXTERNAL_PEERED_PROJECTS", ""); parsed = json.loads(value); assert isinstance(parsed, dict)'
          fi

      - name: Execute Deployment
        id: execute_deployment
        shell: bash
        working-directory: ./infra-ai-hub
        env:
          ARM_USE_OIDC: "true"
          CI: "true" # Common Terraform variables
          TF_VAR_app_name: "ai-services-hub"
          TF_VAR_app_env: ${{ inputs.environment_name }}
          TF_VAR_location: "Canada Central"
          TF_VAR_resource_group_name: ${{ format('{0}-{1}', 'ai-services-hub', inputs.environment_name) }}
          TF_VAR_common_tags: >-
            {"environment":"${{ inputs.environment_name }}","app_env":"${{ inputs.environment_name }}","repo_name":"${{ github.event.repository.name }}"}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_graph_client_id: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}

          # Network-related variables (used by different modes)
          TF_VAR_vnet_name: ${{ secrets.VNET_NAME }}
          TF_VAR_vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          TF_VAR_vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
          TF_VAR_dev_address_spaces: ${{ secrets.DEV_ADDRESS_SPACES }}
          TF_VAR_test_address_spaces: ${{ secrets.TEST_ADDRESS_SPACES }}
          TF_VAR_prod_address_spaces: ${{ secrets.PROD_ADDRESS_SPACES }}
          TF_VAR_source_vnet_address_space: ${{ secrets.SOURCE_VNET_ADDRESS_SPACE }}
          TF_VAR_subnet_allocation: ${{ secrets.SUBNET_ALLOCATION }}
          EXTERNAL_PEERED_PROJECTS_JSON: ${{ secrets.EXTERNAL_PEERED_PROJECTS }}

          # Container image tag override — prod uses semver tag, dev/test use latest
          TF_VAR_container_image_tag_job_key_rotation: ${{ inputs.tag != 'latest' && inputs.tag || '' }}
          TF_VAR_container_image_tag_svc_pii_redaction: ${{ inputs.tag != 'latest' && inputs.tag || '' }}
          # Only used by infra-ai-hub, harmless if unset/unused
          TF_VAR_key_vault_name: ${{ format('{0}{1}{2}kv', 'aihub', inputs.environment_name, vars.SUBSCRIPTION_NAME) }}

          # Backend configuration for deploy script
          BACKEND_RESOURCE_GROUP: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          BACKEND_STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT_NAME }}

          # Disable ANSI colour codes so plan output can be parsed reliably
          TF_CLI_ARGS: "-no-color"

          HTTP_PROXY: "http://127.0.0.1:8118"
          HTTPS_PROXY: "http://127.0.0.1:8118"
          # Bypass proxy for Azure control plane APIs and Terraform registries; data plane uses proxy for private endpoint access
          NO_PROXY: "management.azure.com,login.microsoftonline.com,graph.microsoft.com,registry.terraform.io,releases.hashicorp.com,github.com,objects.githubusercontent.com"
        run: |
          set -euo pipefail

          export no_proxy="$NO_PROXY"

          if [[ -n "${EXTERNAL_PEERED_PROJECTS_JSON}" ]]; then
            export TF_VAR_external_peered_projects="${EXTERNAL_PEERED_PROJECTS_JSON}"
          fi

          # Make all scripts executable
          chmod +x ./scripts/*.sh

          LOG_FILE="$RUNNER_TEMP/terraform-${{ inputs.environment_name }}-${{ inputs.command }}.log"

          # Run deployment via script
          ./scripts/deploy-terraform.sh "${{ inputs.command }}" "${{ inputs.environment_name }}" 2>&1 | tee "$LOG_FILE"

          echo "log_file=$LOG_FILE" >> "$GITHUB_OUTPUT"

      - name: Build plan summary output
        id: plan_summary
        if: inputs.command == 'plan'
        shell: bash
        env:
          PLAN_COMMENT_FILE: ${{ runner.temp }}/plan-comment.md
        run: |
          chmod +x ./.github/scripts/build-plan-summary.sh
          ./.github/scripts/build-plan-summary.sh \
            "${{ steps.execute_deployment.outputs.log_file }}" \
            "$GITHUB_OUTPUT" \
            "$PLAN_COMMENT_FILE"

      - name: Upload plan comment artifact
        if: inputs.command == 'plan'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: plan-comment
          path: ${{ runner.temp }}/plan-comment.md
          retention-days: 1
          if-no-files-found: warn

      # Always release the lock so the cost-saving automation isn't permanently blocked.
      # After 7 PM Pacific, also fire Delete-BastionHost so a late deploy doesn't leave the
      # Bastion running overnight — but skip it when integration tests will run next and still
      # need the tunnel (they own the teardown in that case).
      - name: Release Bastion lock (+ delete after 7 PM PT)
        if: always()
        shell: bash
        run: |
          integ_follows_flag=""
          if [[ "${{ inputs.command }}" == "apply" && \
                ( "${{ inputs.environment_name }}" == "dev" || "${{ inputs.environment_name }}" == "test" ) ]]; then
            integ_follows_flag="--integ-follows"
          fi
          bash .github/scripts/bastion-purge.sh $integ_follows_flag

  integration-tests:
    name: Integration Tests via Secure Tunnel # it only works with apply as terraform state is refreshed, fails otherwise.
    if: inputs.command == 'apply' && (inputs.environment_name == 'dev' || inputs.environment_name == 'test')
    needs: terraform
    uses: ./.github/workflows/.integration-tests-using-secure-tunnel.yml
    with:
      environment_name: ${{ inputs.environment_name }}
      tag: ${{ inputs.tag }}
    secrets: inherit
