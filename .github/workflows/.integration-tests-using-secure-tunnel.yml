name: .Integration Tests via Secure Tunnel

on:
  workflow_call:
    inputs:
      environment_name:
        description: "The target environment for integration tests"
        required: true
        type: string
      proxy_url:
        description: "Encrypted proxy URL for secure tunnel"
        required: true
        type: string
      proxy_auth:
        description: "Encrypted proxy auth token for secure tunnel"
        required: true
        type: string
      tag:
        description: "Container tag for privoxy image"
        required: false
        type: string

env:
  TF_VERSION: 1.12.2
  CHISEL_IMAGE_VERSION: 1.11
  CHISEL_IMAGE: jpillora/chisel
  # Common vars shared by both integration test steps
  ARM_USE_OIDC: "true"
  CI: "true"
  TF_VAR_app_name: "ai-services-hub"
  TF_VAR_location: "Canada Central"
  TF_CLI_ARGS: "-no-color"

permissions:
  id-token: write
  contents: read

jobs:
  integration-tests:
    name: Integration Tests (${{ inputs.environment_name }})
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment_name }}
    env:
      # Dynamic vars that reference inputs/secrets/vars — available at job scope
      TF_VAR_app_env: ${{ inputs.environment_name }}
      TF_VAR_resource_group_name: ${{ format('{0}-{1}', 'ai-services-hub', inputs.environment_name) }}
      TF_VAR_common_tags: >-
        {"environment":"${{ inputs.environment_name }}","app_env":"${{ inputs.environment_name }}","repo_name":"${{ github.event.repository.name }}"}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_vnet_name: ${{ secrets.VNET_NAME }}
      TF_VAR_vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
      TF_VAR_vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
      TF_VAR_dev_address_spaces: ${{ secrets.DEV_ADDRESS_SPACES }}
      TF_VAR_test_address_spaces: ${{ secrets.TEST_ADDRESS_SPACES }}
      TF_VAR_prod_address_spaces: ${{ secrets.PROD_ADDRESS_SPACES }}
      TF_VAR_source_vnet_address_space: ${{ secrets.SOURCE_VNET_ADDRESS_SPACE }}
      TF_VAR_key_vault_name: ${{ format('{0}{1}{2}kv', 'aihub', inputs.environment_name, vars.SUBSCRIPTION_NAME) }}
      BACKEND_RESOURCE_GROUP: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
      BACKEND_STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT_NAME }}
      TEST_ENV: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Run proxy client
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${{ inputs.proxy_url }}" || -z "${{ inputs.proxy_auth }}" ]]; then
            echo "proxy_url and proxy_auth are required when use_secure_tunnel=true" >&2
            exit 1
          fi

          KEY='${{ secrets.GPG_PASSPHRASE }}'
          if [[ -z "$KEY" ]]; then
            echo "GPG_PASSPHRASE secret is empty/missing" >&2
            exit 1
          fi

          decrypt_b64_gpg() {
            local encoded="$1"
            printf '%s' "$encoded" \
              | tr -d '\r\n' \
              | base64 --decode \
              | gpg --batch --yes --pinentry-mode loopback --passphrase "$KEY" --decrypt --output -
          }

          PROXY_URL="$(decrypt_b64_gpg '${{ inputs.proxy_url }}')"
          PROXY_AUTH="$(decrypt_b64_gpg '${{ inputs.proxy_auth }}')"
          echo "Proxy URL: ****${PROXY_URL: -4}"
          echo "Proxy Auth: ****${PROXY_AUTH: -4}"

          docker network create proxy-net >/dev/null 2>&1 || true
          docker run -d --name chisel-client --network proxy-net ${CHISEL_IMAGE}:${CHISEL_IMAGE_VERSION} client --auth "$PROXY_AUTH" "$PROXY_URL" 0.0.0.0:1080:socks
          docker run -d --name privoxy --network proxy-net -p 127.0.0.1:8118:8118 -e SOCKS_HOST=chisel-client -e SOCKS_PORT=1080 ghcr.io/${{ github.repository }}/azure-proxy/privoxy:${{ inputs.tag || 'latest' }}
          docker logs chisel-client
          docker logs privoxy

      - name: Install Python integration test dependencies
        shell: bash
        working-directory: ./tests/integration
        run: |
          set -euo pipefail
          uv sync --group dev

      - name: Run Integration Tests (no proxy)
        shell: bash
        working-directory: ./tests/integration
        # No HTTP_PROXY — APIM and App Gateway are public endpoints.
        run: |
          set -euo pipefail

          echo "=== Running Integration Tests — direct (no proxy) ==="
          uv run python ./run-tests.py --env "${TEST_ENV}" --group direct

      - name: Resolve AI Evaluation config from Terraform outputs
        shell: bash
        working-directory: ./tests/integration
        run: |
          set -euo pipefail

          append_env() {
            local name="$1"
            local value="$2"
            {
              printf '%s<<EOF\n' "$name"
              printf '%s\n' "$value"
              printf 'EOF\n'
            } >> "$GITHUB_ENV"
          }

          tf_outputs="$(../../infra-ai-hub/scripts/deploy-terraform.sh output "${TEST_ENV}")"
          appgw_url="$(jq -r '.appgw_url.value // empty' <<<"$tf_outputs")"
          apim_gateway_url="$(jq -r '.apim_gateway_url.value // empty' <<<"$tf_outputs")"
          judge_base_url="${appgw_url:-$apim_gateway_url}"
          judge_api_key="$(jq -r '.apim_tenant_subscriptions.value["ai-hub-admin"].primary_key // empty' <<<"$tf_outputs")"

          append_env "AI_EVAL_TENANT" "ai-hub-admin"
          append_env "AI_EVAL_MODEL" "gpt-4.1-mini"
          append_env "AI_EVAL_JUDGE_DEPLOYMENT" "gpt-5.1-chat"
          append_env "AI_EVAL_JUDGE_API_VERSION" "2024-10-21"

          if [[ -z "$judge_base_url" || -z "$judge_api_key" ]]; then
            echo "AI evaluation config could not be derived from terraform outputs; the evaluation step may skip."
            exit 0
          fi

          judge_endpoint="${judge_base_url%/}/ai-hub-admin"
          echo "::add-mask::$judge_api_key"
          append_env "AI_EVAL_JUDGE_ENDPOINT" "$judge_endpoint"
          append_env "AI_EVAL_JUDGE_API_KEY" "$judge_api_key"

      - name: Run AI Evaluation (optional)
        shell: bash
        working-directory: ./tests/integration
        env:
          AI_EVAL_MIN_RELEVANCE: ${{ vars.AI_EVAL_MIN_RELEVANCE }}
          AI_EVAL_MIN_COHERENCE: ${{ vars.AI_EVAL_MIN_COHERENCE }}
          AI_EVAL_MIN_FLUENCY: ${{ vars.AI_EVAL_MIN_FLUENCY }}
          AI_EVAL_MIN_SIMILARITY: ${{ vars.AI_EVAL_MIN_SIMILARITY }}
          AI_EVAL_MIN_F1_SCORE: ${{ vars.AI_EVAL_MIN_F1_SCORE }}
        run: |
          set -euo pipefail

          echo "=== Running Azure AI Evaluation (optional) ==="
          uv run python ./run-evaluation.py --env "${TEST_ENV}"

      - name: Run Key Vault Integration Tests (with proxy)
        shell: bash
        working-directory: ./tests/integration
        env:
          # Proxy required: Hub Key Vault has public_network_access_enabled=false
          # (private endpoint only). az keyvault secret show must reach vault.azure.net
          # through the tunnel.
          HTTP_PROXY: "http://127.0.0.1:8118"
          HTTPS_PROXY: "http://127.0.0.1:8118"
          NO_PROXY: "management.azure.com,login.microsoftonline.com,graph.microsoft.com,registry.terraform.io,releases.hashicorp.com,github.com,objects.githubusercontent.com,blob.core.windows.net"
        run: |
          set -euo pipefail

          echo "=== Running Key Vault Integration Tests — via proxy ==="
          uv run python ./run-tests.py --env "${TEST_ENV}" --group proxy
