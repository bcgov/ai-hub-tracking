# =============================================================================
# Deploy – Tenant Onboarding Portal (tools environment)
# =============================================================================
# Manual re-deploy trigger for the production portal in the tools subscription.
# Runs the same two-stage provision + slot-swap deploy as the auto-deploy in
# merge-main.yml, but can be kicked off on demand without a code change.
#
# Both deployment paths (merge-main auto + this manual trigger) target the
# same App Service: ai-hub-onboarding (tools subscription, P0v4 ASP, staging
# deployment slot for zero-downtime swaps).
#
# All secrets/variables are from the 'tools' GitHub Environment.
# Required secrets:
#   AZURE_CLIENT_ID            – OIDC-federated service principal client ID
#   AZURE_TENANT_ID            – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID      – Azure subscription ID
#   BACKEND_RESOURCE_GROUP     – resource group for TF state storage account
#   BACKEND_STORAGE_ACCOUNT    – storage account name for Terraform state
#   PORTAL_SECRET_KEY          – Starlette session encryption key (≥32 bytes)
#   PORTAL_OIDC_CLIENT_SECRET  – Keycloak confidential client secret
#   PORTAL_TABLE_STORAGE_ACCOUNT_ID – Storage Account resource ID (for RBAC)
#
# Required variables:
#   PORTAL_RESOURCE_GROUP            – resource group to deploy into
#   PORTAL_LOCATION                  – Azure region (e.g. canadacentral)
#   PORTAL_OIDC_DISCOVERY_URL        – BCGov Keycloak .well-known URL
#   PORTAL_OIDC_CLIENT_ID            – Keycloak client ID
#   PORTAL_OIDC_ADMIN_ROLE           – Keycloak role for admin access
#   PORTAL_TABLE_STORAGE_ACCOUNT_URL – https://<account>.table.core.windows.net
#   PORTAL_ENABLE_TABLE_RBAC         – true/false
#   PORTAL_ADMIN_EMAILS              – comma-separated fallback admin emails
# =============================================================================

name: Deploy Portal

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.12.2
  TF_WORKING_DIR: tenant-onboarding-portal/infra

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: provision
  # Runs terraform apply to create/update the P0v4 App Service Plan,
  # ai-hub-onboarding App Service, staging slot, and RBAC assignments.
  # ---------------------------------------------------------------------------
  provision:
    name: Terraform provision (tools)
    runs-on: ubuntu-24.04
    environment: tools
    timeout-minutes: 20

    outputs:
      app_service_name: ${{ steps.tf_outputs.outputs.app_service_name }}
      app_hostname: ${{ steps.tf_outputs.outputs.app_hostname }}
      staging_hostname: ${{ steps.tf_outputs.outputs.staging_hostname }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Expose raw output so we can parse `terraform output` values.
          terraform_wrapper: false

      # -----------------------------------------------------------------------
      # terraform init — partial backend config supplied via -backend-config
      # flags so no sensitive values are committed to the repository.
      # -----------------------------------------------------------------------
      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=portal/tools/terraform.tfstate" \
            -backend-config="use_oidc=true"

      # -----------------------------------------------------------------------
      # terraform apply — all variable values come from GitHub Environments
      # secrets/vars via TF_VAR_* so no tfvars file is needed in CI.
      # -----------------------------------------------------------------------
      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          CI: "true"
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          # Infrastructure shape
          TF_VAR_app_env: "tools"
          TF_VAR_location: ${{ vars.PORTAL_LOCATION }}
          TF_VAR_resource_group_name: ${{ vars.PORTAL_RESOURCE_GROUP }}
          TF_VAR_sku_name: "P0v4"
          TF_VAR_enable_always_on: "true"
          TF_VAR_enable_table_rbac: ${{ vars.PORTAL_ENABLE_TABLE_RBAC }}
          TF_VAR_app_name_override: "ai-hub-onboarding"
          TF_VAR_enable_deployment_slot: "true"
          # Sensitive infra inputs
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_table_storage_account_id: ${{ secrets.PORTAL_TABLE_STORAGE_ACCOUNT_ID }}
          # App settings pushed into App Service environment
          TF_VAR_secret_key: ${{ secrets.PORTAL_SECRET_KEY }}
          TF_VAR_oidc_discovery_url: ${{ vars.PORTAL_OIDC_DISCOVERY_URL }}
          TF_VAR_oidc_client_id: ${{ vars.PORTAL_OIDC_CLIENT_ID }}
          TF_VAR_oidc_client_secret: ${{ secrets.PORTAL_OIDC_CLIENT_SECRET }}
          TF_VAR_oidc_admin_role: ${{ vars.PORTAL_OIDC_ADMIN_ROLE }}
          TF_VAR_table_storage_account_url: ${{ vars.PORTAL_TABLE_STORAGE_ACCOUNT_URL }}
          TF_VAR_admin_emails: ${{ vars.PORTAL_ADMIN_EMAILS }}
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "app_service_name=$(terraform output -raw app_service_name)"         >> "$GITHUB_OUTPUT"
          echo "app_hostname=$(terraform output -raw app_service_default_hostname)" >> "$GITHUB_OUTPUT"
          echo "staging_hostname=$(terraform output -raw staging_slot_hostname)"    >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 2: deploy
  # Deploys to the staging slot, verifies health, then swaps staging →
  # production for zero-downtime rollout. Oryx installs requirements.txt
  # inside the slot sandbox before the swap.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy code (tools – slot swap)
    needs: provision
    runs-on: ubuntu-24.04
    environment: tools
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # Build deployment zip.
      # Excludes:  tests/ (not needed at runtime)
      #            infra/ (Terraform only, not application code)
      #            __pycache__/ + *.pyc (byte-compiled cache)
      #            .env* (local dev secrets must not be deployed)
      # -----------------------------------------------------------------------
      - name: Create deployment zip
        working-directory: tenant-onboarding-portal
        run: |
          zip -r ../portal-deploy.zip . \
            --exclude "*/__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*/tests/*" \
            --exclude "infra/*" \
            --exclude ".env*" \
            --exclude ".git*"
          echo "Zip size: $(du -sh ../portal-deploy.zip | cut -f1)"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        run: |
          az webapp deploy \
            --resource-group "${{ vars.PORTAL_RESOURCE_GROUP }}" \
            --name "${{ needs.provision.outputs.app_service_name }}" \
            --slot staging \
            --src-path portal-deploy.zip \
            --type zip \
            --async false \
            --timeout 300

      - name: Health check staging slot
        run: |
          STAGING_URL="https://${{ needs.provision.outputs.staging_hostname }}"
          echo "Checking ${STAGING_URL}/healthz ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/healthz")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging slot healthy (HTTP ${STATUS}) — proceeding with swap"
              break
            fi
            echo "Attempt ${i}/6 – HTTP ${STATUS}, retrying in 10s..."
            sleep 10
            if [ "$i" -eq 6 ]; then
              echo "❌ Staging slot health check failed — swap aborted, production unaffected"
              exit 1
            fi
          done

      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ vars.PORTAL_RESOURCE_GROUP }}" \
            --name "${{ needs.provision.outputs.app_service_name }}" \
            --slot staging \
            --target-slot production
          echo "✅ Slot swap complete"

      - name: Verify production health
        run: |
          APP_URL="https://${{ needs.provision.outputs.app_hostname }}"
          echo "Checking ${APP_URL}/healthz ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/healthz")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Portal is healthy (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt ${i}/6 – HTTP ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "❌ Production health check failed after swap"
          exit 1
