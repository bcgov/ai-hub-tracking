# =============================================================================
# Deploy – Tenant Onboarding Portal (tools environment)
# =============================================================================
# Manual re-deploy trigger for the production portal in the tools subscription.
# Runs the same single-job apply-driven deploy as the auto-deploy in
# merge-main.yml, but can be kicked off on demand without a code change.
#
# Both deployment paths (merge-main auto + this manual trigger) target the
# same App Service: ai-hub-onboarding (tools subscription, P0v4 ASP, staging
# deployment slot for zero-downtime swaps).
#
# All secrets/variables are from the 'tools' GitHub Environment.
# Required secrets:
#   AZURE_CLIENT_ID            – OIDC-federated service principal client ID
#   AZURE_TENANT_ID            – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID      – Azure subscription ID
#   BACKEND_RESOURCE_GROUP     – resource group for TF state storage account
#   BACKEND_STORAGE_ACCOUNT    – storage account name for Terraform state
#   PORTAL_OIDC_CLIENT_SECRET  – Keycloak confidential client secret
#
# Required variables:
#   PORTAL_RESOURCE_GROUP            – resource group to deploy into
#   PORTAL_LOCATION                  – Azure region (e.g. canadacentral)
#   PORTAL_OIDC_DISCOVERY_URL        – BCGov Keycloak .well-known URL
#   PORTAL_OIDC_CLIENT_ID            – Keycloak client ID
#   PORTAL_OIDC_ADMIN_ROLE           – Keycloak role for admin access
#   PORTAL_ENABLE_TABLE_RBAC         – true/false
#   PORTAL_ADMIN_EMAILS              – comma-separated fallback admin emails
# =============================================================================

name: Deploy Portal

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PORTAL_NODE_VERSION_FILE: tenant-onboarding-portal/.node-version
  TF_VERSION: 1.12.2
  TF_WORKING_DIR: tenant-onboarding-portal/infra

jobs:
  # ---------------------------------------------------------------------------
  # Single portal deploy job
  # Runs terraform apply, then packages and deploys the portal app through the
  # staging slot before swapping to production. The wrapper step also emits the
  # key App Service outputs directly to GitHub step outputs.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy ai-hub-onboarding (tools)
    runs-on: ubuntu-24.04
    environment: tools
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ env.PORTAL_NODE_VERSION_FILE }}
          cache: npm
          cache-dependency-path: |
            tenant-onboarding-portal/backend/package-lock.json
            tenant-onboarding-portal/frontend/package-lock.json

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform apply
        id: apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          CI: "true"
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          BACKEND_RESOURCE_GROUP: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          BACKEND_STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT_NAME }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_location: "Canada Central"
          TF_VAR_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          PORTAL_STATE_KEY: portal/tools/terraform.tfstate
          TF_VAR_vnet_name: ${{ secrets.VNET_NAME }}
          TF_VAR_vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          TF_VAR_sku_name: "P0v4"
          TF_VAR_enable_always_on: "true"
          TF_VAR_app_name_override: "ai-hub-onboarding"
          TF_VAR_enable_deployment_slot: "false"  # Staging slot disabled - blocked by Deny-AppSlots-Public policy
          # Sensitive infra inputs
          # App settings pushed into App Service environment
          TF_VAR_oidc_discovery_url: https://loginproxy.gov.bc.ca/auth/realms/standard/.well-known/openid-configuration
          TF_VAR_oidc_client_id: ai-hub-admin-portal-6366
          TF_VAR_oidc_client_secret: ${{ secrets.PORTAL_PROD_OIDC_CLIENT_SECRET }}
          PORTAL_NODE_VERSION_FILE: ${{ env.PORTAL_NODE_VERSION_FILE }}
        run: bash ./deploy-terraform.sh apply tools --auto-approve --no-var-file
