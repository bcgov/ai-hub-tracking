name: Deploy TEST on Main Merge

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "azure-proxy/**"
      - "initial-setup/**"
      - "ssl_certs/**"
      - "README.md"
      - "docker-compose.yml"
permissions:
  id-token: write
  contents: write

concurrency:
  group: deploy-test-on-main
  cancel-in-progress: false

jobs:
  semantic-version:
    name: Semantic Version & Tag
    outputs:
      semanticVersion: ${{ steps.changelog.outputs.version }}
      tag: ${{ steps.changelog.outputs.tag }}
      clean_changelog: ${{ steps.changelog.outputs.clean_changelog }}
      skipped: ${{ steps.changelog.outputs.skipped }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Conventional Changelog Update
        uses: TriPSs/conventional-changelog-action@v6
        id: changelog
        continue-on-error: true
        with:
          preset: "conventionalcommits"
          github-token: ${{ github.token }}
          output-file: "CHANGELOG.md"
          skip-version-file: "true"
          skip-commit: "true"
          skip-on-empty: "false"
          git-push: "true"

      - name: Tag summary
        run: |
          echo "### 🏷️ Semantic Version" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.changelog.outputs.skipped }}" == "true" ]]; then
            echo "No version bump (no conventional commits since last tag)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Version:** \`${{ steps.changelog.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Tag:** \`${{ steps.changelog.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  tag-container-images:
    name: Tag Container Images with Semver
    needs: semantic-version
    if: needs.semantic-version.outputs.skipped != 'true' && needs.semantic-version.outputs.tag != ''
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    timeout-minutes: 5
    strategy:
      matrix:
        package:
          - azure-proxy/chisel
          - azure-proxy/privoxy
          - jobs/apim-key-rotation
          - pii-redaction-service
    steps:
      - name: Tag image with semver
        uses: shrink/actions-docker-registry-tag@f04afd0559f66b288586792eb150f45136a927fa # v4
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.package }}
          target: latest
          tags: |
            ${{ needs.semantic-version.outputs.semanticVersion }}
            ${{ needs.semantic-version.outputs.tag }}

  detect-infra-changes:
    name: Detect infra/test changes
    uses: ./.github/workflows/.detect-changes.yml
    with:
      paths: |
        infra-ai-hub/
        tests/
      comparison: push
      default_changed: false

  deploy-proxy-in-tools-environment:
    name: Deploy Proxy in tools
    needs: detect-infra-changes
    if: needs.detect-infra-changes.outputs.changed == 'true'
    uses: ./.github/workflows/.deployer.yml
    with:
      environment_name: tools
      command: apply
      target_module: azure_proxy
      tag: latest
      terraform_log_level: ERROR
    secrets: inherit

  apply-to-test-environment:
    name: Apply to test Environment
    if: >-
      ${{
        always() &&
        needs.detect-infra-changes.outputs.changed == 'true' &&
        needs.deploy-proxy-in-tools-environment.result == 'success' &&
        needs.semantic-version.result == 'success' &&
        (needs.tag-container-images.result == 'success' || needs.tag-container-images.result == 'skipped')
      }}
    needs:
      [
        "detect-infra-changes",
        "deploy-proxy-in-tools-environment",
        "tag-container-images",
        "semantic-version",
      ]
    uses: ./.github/workflows/.deployer-using-secure-tunnel.yml
    with:
      environment_name: test
      command: apply
      proxy_url: ${{ needs.deploy-proxy-in-tools-environment.outputs.proxy_url }}
      proxy_auth: ${{ needs.deploy-proxy-in-tools-environment.outputs.proxy_auth }}
      tag: ${{ needs.semantic-version.outputs.tag }}
      terraform_log_level: ERROR
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Portal deploy: update ai-hub-onboarding on every main merge that
  # touches tenant-onboarding-portal/. Runs independently of the infra chain.
  # The apply step provisions infra, packages the app, deploys to staging,
  # swaps to production, and emits outputs directly.
  # ---------------------------------------------------------------------------
  detect-portal-changes:
    name: Detect portal changes
    uses: ./.github/workflows/.detect-changes.yml
    with:
      paths: |
        tenant-onboarding-portal/
      comparison: push
      default_changed: false

  # ---------------------------------------------------------------------------
  # Collect AI hub Terraform outputs (dev / test / prod)
  # Downloads the shared and APIM remote state blobs for each hub environment
  # and emits Key Vault IDs, Key Vault URIs, and APIM gateway URLs as job
  # outputs for the portal deploy job. Must stay unconditional — if gated and
  # skipped, GHA resolves all outputs as empty strings, silently zeroing the
  # nine TF_VAR_* hub values and removing RBAC assignments on the next deploy.
  # ---------------------------------------------------------------------------
  collect-hub-outputs:
    name: Collect hub Terraform outputs
    uses: ./.github/workflows/.collect-hub-outputs.yml
    secrets: inherit

  deploy-portal-tools:
    name: Deploy ai-hub-onboarding (tools)
    needs: [detect-portal-changes, collect-hub-outputs]
    if: needs.detect-portal-changes.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    environment: tools
    timeout-minutes: 20
    env:
      PORTAL_NODE_VERSION_FILE: tenant-onboarding-portal/.node-version
      TF_VERSION: 1.12.2
      TF_WORKING_DIR: tenant-onboarding-portal/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ env.PORTAL_NODE_VERSION_FILE }}
          cache: npm
          cache-dependency-path: |
            tenant-onboarding-portal/backend/package-lock.json
            tenant-onboarding-portal/frontend/package-lock.json

      - name: Azure CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform apply
        id: apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          CI: "true"
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          BACKEND_RESOURCE_GROUP: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          BACKEND_STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT_NAME }}
          PORTAL_STATE_KEY: portal/tools/terraform.tfstate
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_location: "Canada Central"
          TF_VAR_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          TF_VAR_vnet_name: ${{ secrets.VNET_NAME }}
          TF_VAR_vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          TF_VAR_app_name_override: "ai-hub-onboarding"
          TF_VAR_sku_name: "P0v4"
          TF_VAR_enable_always_on: "true"
          TF_VAR_oidc_discovery_url: https://loginproxy.gov.bc.ca/auth/realms/standard/.well-known/openid-configuration
          TF_VAR_oidc_client_id: ai-hub-admin-portal-6366
          TF_VAR_oidc_client_secret: ${{ secrets.PORTAL_PROD_OIDC_CLIENT_SECRET }}
          # Staging slot disabled - blocked by Deny-AppSlots-Public policy (public network access).
          TF_VAR_enable_deployment_slot: "false"
          TF_VAR_hub_keyvault_id_dev: ${{ needs.collect-hub-outputs.outputs.hub_kv_dev_id }}
          TF_VAR_hub_keyvault_id_test: ${{ needs.collect-hub-outputs.outputs.hub_kv_test_id }}
          TF_VAR_hub_keyvault_id_prod: ${{ needs.collect-hub-outputs.outputs.hub_kv_prod_id }}
          TF_VAR_hub_keyvault_url_dev: ${{ needs.collect-hub-outputs.outputs.hub_kv_dev_url }}
          TF_VAR_hub_keyvault_url_test: ${{ needs.collect-hub-outputs.outputs.hub_kv_test_url }}
          TF_VAR_hub_keyvault_url_prod: ${{ needs.collect-hub-outputs.outputs.hub_kv_prod_url }}
          TF_VAR_apim_gateway_url_dev: ${{ needs.collect-hub-outputs.outputs.apim_url_dev }}
          TF_VAR_apim_gateway_url_test: ${{ needs.collect-hub-outputs.outputs.apim_url_test }}
          TF_VAR_apim_gateway_url_prod: ${{ needs.collect-hub-outputs.outputs.apim_url_prod }}
          PORTAL_NODE_VERSION_FILE: ${{ env.PORTAL_NODE_VERSION_FILE }}
        run: bash ./deploy-terraform.sh apply tools --auto-approve --no-var-file
