name: .Tools Environment Deployer

# Provisions the shared `tools` environment in two ordered stages:
#   1. initial-setup/infra Terraform — resource group, spoke network wiring, and
#      monitoring (Log Analytics workspace + Application Insights).
#   2. Azure Bastion + jumpbox via the upstream bcgov/action-deployer-vm-bastion-alz
#      action, reusing the Log Analytics workspace produced by stage 1.
# Together these replace the legacy chisel "azure_proxy" App Service and provide
# private-endpoint reach for dev/test/prod deployments via native client tunnelling
# (see .deployer-using-secure-tunnel.yml).
on:
  workflow_call:
    inputs:
      command:
        description: "The Terraform command to run (plan, apply, destroy)"
        required: true
        default: "apply"
        type: string

permissions:
  id-token: write # Required for OIDC authentication
  contents: read

concurrency:
  cancel-in-progress: false
  group: "tools" # shared tools environment (initial-setup + bastion); serialise to avoid state races.

env:
  # Source of truth: .github/lib/constants.sh — populated at runtime by each job's "Load constants" step.
  TF_VERSION: ""

jobs:
  initial-setup:
    name: Initial setup ${{ inputs.command }} (tools)
    # Skip on destroy: tearing down the Bastion stack must NOT remove the shared
    # tools infrastructure (resource group, network wiring, Log Analytics workspace).
    if: inputs.command != 'destroy'
    environment: tools
    runs-on: ubuntu-24.04
    outputs:
      log_analytics_workspace_id: ${{ steps.deploy.outputs.log_analytics_workspace_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Load constants
        shell: bash
        run: |
          source .github/lib/constants.sh
          echo "TF_VERSION=$TF_VERSION" >> "$GITHUB_ENV"

      - name: Azure CLI Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Disable the wrapper so `terraform output` errors go to stderr,
          # not stdout — prevents the annotation "::error::Terraform exited
          # with code 1." from being captured into log_analytics_workspace_id.
          terraform_wrapper: false

      - name: Make deploy script executable
        shell: bash
        run: chmod +x ./initial-setup/infra/deploy-terraform.sh

      - name: Terraform ${{ inputs.command }} (initial setup)
        id: deploy
        shell: bash
        working-directory: ./initial-setup/infra
        env:
          CI: "true"
          ARM_USE_OIDC: "true"
          # Backend state for the initial-setup root (defaults to
          # ai-hub-deploy-utils/tools/terraform.tfstate inside deploy-terraform.sh) —
          # kept separate from the Bastion stack's own state key below.
          BACKEND_RESOURCE_GROUP: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          BACKEND_STORAGE_ACCOUNT: ${{ vars.STORAGE_ACCOUNT_NAME }}
          TF_VAR_app_name: "ai-hub"
          TF_VAR_app_env: "tools"
          TF_VAR_location: "Canada Central"
          TF_VAR_resource_group_name: "ai-hub-tools"
          TF_VAR_common_tags: >-
            {"environment":"tools","app_env":"tools","repo_name":"${{ github.event.repository.name }}","managed_by":"Terraform"}
          # Sensitive values sourced from environment secrets.
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_prod_address_spaces: ${{ secrets.PROD_ADDRESS_SPACES }}
          TF_VAR_test_address_spaces: ${{ secrets.TEST_ADDRESS_SPACES }}
          TF_VAR_dev_address_spaces: ${{ secrets.DEV_ADDRESS_SPACES }}
          TF_VAR_vnet_name: ${{ secrets.VNET_NAME }}
          TF_VAR_vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          TF_VAR_vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
        run: |
          set -euo pipefail
          ./deploy-terraform.sh "${{ inputs.command }}" \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="use_oidc=true"
          # Capture the FULL Log Analytics workspace resource ID for the Bastion stage.
          # The output maps to azurerm_log_analytics_workspace.main.id, i.e.
          #   /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.OperationalInsights/workspaces/<name>
          # terraform_wrapper is disabled (see Setup Terraform) so stdout carries only the raw
          # value — but a missing output (e.g. plan on fresh state) can otherwise leak noise such
          # as "::error::Terraform exited with code 1." Forward the value ONLY when it matches a
          # full ARM workspace ID (the same regex the action validates against); otherwise emit
          # empty, which the action accepts and falls back to provisioning its own workspace.
          # stderr is left attached to the job log (it does not pollute the captured
          # stdout value) so a real "Output not found" / backend error stays visible.
          LAW_ID="$(terraform output -raw log_analytics_workspace_id || true)"
          law_re='^/subscriptions/[^/]+/resourcegroups/[^/]+/providers/microsoft\.operationalinsights/workspaces/[^/]+$'
          if printf '%s' "$LAW_ID" | grep -qiE "$law_re"; then
            echo "Captured Log Analytics workspace ID: $LAW_ID"
            echo "log_analytics_workspace_id=$LAW_ID" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::log_analytics_workspace_id is not a full LAW resource ID (got: '${LAW_ID:-<empty>}'); forwarding empty so the Bastion stage provisions its own workspace."
            echo "log_analytics_workspace_id=" >> "$GITHUB_OUTPUT"
          fi

  bastion:
    name: Bastion ${{ inputs.command }} (tools)
    needs: initial-setup
    # Runs after initial-setup on apply/plan; on destroy, initial-setup is
    # intentionally skipped, so allow this job to proceed in that case too.
    if: always() && (needs.initial-setup.result == 'success' || needs.initial-setup.result == 'skipped')
    environment: tools
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Deploy Bastion + jumpbox (tools)
        uses: bcgov/action-deployer-vm-bastion-alz@16c4c9918ad8cd1c3e1f3b026a91e860cbc43675
        with:
          app_name: ai-hub
          app_env: tools
          terraform_command: ${{ inputs.command }}
          location: "Canada Central"
          # Bastion + jumpbox resources land in their own resource group, separate
          # from the VNet RG. This prevents Terraform from touching subnets owned
          # by other stacks (e.g. the old azure_proxy App Service).
          resource_group_name: ai-hub-bastion-tools
          # Isolated state key keeps this stack's state separate from any prior
          # tools-env state that may have tracked app-service-subnet /
          # privateendpoints-subnet from the legacy azure_proxy approach.
          backend_state_key: ai-hub/tools/bastion/terraform.tfstate
          # Bastion + jumpbox are provisioned in the tools subscription.
          backend_storage_account: ${{ vars.STORAGE_ACCOUNT_NAME }}
          backend_resource_group: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          vnet_name: ${{ secrets.VNET_NAME }}
          vnet_resource_group_name: ${{ secrets.VNET_RESOURCE_GROUP_NAME }}
          vnet_address_space: ${{ secrets.VNET_ADDRESS_SPACE }}
          bastion_subnet_address_prefix: ${{ secrets.BASTION_SUBNET_ADDRESS_PREFIX }}
          jumpbox_subnet_address_prefix: ${{ secrets.JUMPBOX_SUBNET_ADDRESS_PREFIX }}
          # Comma-separated Entra object IDs granted "Virtual Machine Administrator Login".
          # MUST include the CI service principal so `az network bastion ssh --auth-type AAD` works.
          vm_admin_login_principal_ids: ${{ secrets.VM_ADMIN_LOGIN_PRINCIPAL_IDS }}
          bastion_sku: Standard
          enable_bastion: "true"
          enable_jumpbox: "true"
          enable_bastion_automation: "true"
          # Reuse the Log Analytics workspace created by the initial-setup stage
          # for Bastion audit diagnostics instead of provisioning a second one.
          # Empty on destroy (initial-setup skipped), which is fine for teardown.
          enable_monitoring: "true"
          existing_log_analytics_workspace_id: ${{ needs.initial-setup.outputs.log_analytics_workspace_id }}
